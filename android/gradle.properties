org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
# Some plugins (e.g. tflite_flutter 0.12.1) pin Java compatibility to 11 while
# Kotlin 2.2 under JDK 17 targets 17; Kotlin's default `error` validation then
# fails the intra-project Java/Kotlin JVM-target check. Downgrade to a warning
# so those plugins build (Android's D8/R8 dexes the mixed bytecode fine).
kotlin.jvm.target.validation.mode=warning
