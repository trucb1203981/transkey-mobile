name: transkey_mobile
description: Real-time translation app by TransKey.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Navigation
  go_router: ^13.0.0

  # Crypto & Device
  crypto: ^3.0.3
  device_info_plus: ^10.0.0
  package_info_plus: ^6.0.0

  # TTS
  flutter_tts: ^4.0.0

  # Deep links
  app_links: ^6.3.0

  # Utilities
  url_launcher: ^6.2.0
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  intl: ^0.19.0
  uuid: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
