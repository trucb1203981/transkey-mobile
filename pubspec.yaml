name: transkey_mobile
description: Real-time translation app by TransKey.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Navigation
  go_router: ^13.0.0

  # Crypto & Device
  crypto: ^3.0.3
  device_info_plus: ^10.0.0
  package_info_plus: ^9.0.1

  # TTS
  flutter_tts: ^4.0.0

  # Speech-to-text (mic input on home screen)
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.0

  # Rewarded video ads for free users to top up daily quota.
  # Production ad units are configured in AdMob console; the build
  # currently uses Google's public test ad unit IDs for development.
  google_mobile_ads: ^6.0.0

  # Camera (camera translate feature)
  camera: ^0.11.0
  google_mlkit_text_recognition: ^0.14.0
  # Lets the camera screen pick an existing photo from the device gallery
  # and run it through the same OCR + scene pipeline as a live capture.
  image_picker: ^1.1.2
  # Direct read of the native OS device orientation (Android
  # OrientationEventListener / iOS UIDeviceOrientation). The camera
  # plugin's own CameraValue.deviceOrientation reports portraitUp even
  # in landscape under our configChanges="orientation" setup, so we
  # use this as the authoritative source at capture time to decide
  # how to rotate the captured JPEG.
  native_device_orientation: ^2.0.5
  # Share the captured + translated camera result with other apps —
  # users typically screenshot the result overlay and send it to a
  # travel companion ("look at this menu I translated"). Single
  # function used: Share.shareXFiles(<png>) wrapped by a Share button
  # on the result action bar.
  share_plus: ^11.0.0

  # Deep links
  app_links: ^6.3.0

  # Google Sign-In (native, replaces browser OAuth flow on mobile)
  google_sign_in: ^6.2.1

  # Utilities
  url_launcher: ^6.2.0
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  intl: ^0.20.0
  uuid: ^4.3.0

  # Image preprocessing for OCR: grayscale + contrast boost + invert
  # significantly improves recognition on chalkboard / low-contrast text.
  image: ^4.5.4
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
